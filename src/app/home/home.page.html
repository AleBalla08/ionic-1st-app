<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Receitas
    </ion-title>
  </ion-toolbar>
</ion-header>
<ion-content>
  <ion-list>
    @for (r of recipes; track r.id) {
      <ion-item [routerLink]="['/recipes', r.id]">
        <ion-avatar slot="start">
          <ion-img [src]="r.imageUrl"></ion-img>
        </ion-avatar>
        <ion-label>
          {{r.title}}
        </ion-label>
      </ion-item>
    }
  </ion-list>
</ion-content>
